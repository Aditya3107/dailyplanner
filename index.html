  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ace Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"0488f223-10cf-49f6-84ca-d2e935b3b1d0\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"99a9c081-0f56-4fe5-a272-2d68c839a3d4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    html, body { margin: 0; padding: 0; background: #0B0D12; }\n    body { font-family: 'Space Grotesk', system-ui, sans-serif; }\n    a { color: #A8E637; text-decoration: none; }\n    a:hover { color: #C6F56B; }\n    ::-webkit-scrollbar { width: 6px; }\n    ::-webkit-scrollbar-thumb { background: #2A3040; border-radius: 3px; }\n    ::-webkit-scrollbar-track { background: transparent; }\n    @keyframes toastPop { 0% { transform: translateY(12px) scale(0.92); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }\n    @keyframes riseIn { from { transform: translateY(6px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }\n    input::placeholder { color: #545C70; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-screen-label=\"Daily Planner Widget\" style=\"min-height: 100vh; background: radial-gradient(1200px 700px at 70% -10%, #131826 0%, #0B0D12 55%); display: flex; align-items: center; justify-content: center; padding: max(12px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left)); border-width: 5px; border-style: solid; border-color: #000000; opacity: 1; min-height: 100dvh; box-sizing: border-box\">\n\n  <div style=\"position: relative; width: min(420px, 100%); background: #12151D; border: 1px solid #242B3B; border-radius: 20px; box-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.4); overflow: hidden; display: flex; flex-direction: column; height: min(720px, calc(100dvh - 34px));\">\n\n    <canvas ref=\"{{ setCanvas }}\" width=\"384\" height=\"660\" style=\"position: absolute; inset: 0; z-index: 60; pointer-events: none; border-radius: 5px\"><\u002Fcanvas>\n\n    <!-- Header -->\n    <div style=\"display: flex; align-items: center; justify-content: space-between; padding: 16px 18px 12px 18px; border-bottom: 1px solid #1D2330;\">\n      <div style=\"display: flex; flex-direction: column; gap: 2px;\">\n        <div style=\"font-size: 15px; font-weight: 600; color: #E8EAF2; letter-spacing: 0.01em;\">{{ dateLabel }}<\u002Fdiv>\n        <div style=\"font-size: 11px; color: #8B92A8;\">{{ headerSub }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div title=\"Days at 80%+ completion\" style=\"display: flex; align-items: center; gap: 6px; background: #1B1F14; border: 1px solid #3A4520; border-radius: 999px; padding: 5px 12px 5px 9px;\">\n        <svg width=\"13\" height=\"15\" viewBox=\"0 0 13 15\" fill=\"none\"><path d=\"M6.5 0.5C7 3 9.8 4.4 11.2 6.6c1.5 2.4 1 5.5-1.2 7.1-2.1 1.6-5.3 1.6-7.4 0C.4 12.1-.2 9 1.3 6.6 2 5.4 3 4.6 3.6 3.4c.3.7.4 1.5.2 2.3C5.2 4.5 6.3 2.6 6.5.5z\" fill=\"#FFB454\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-size: 13px; font-weight: 700; color: #FFB454;\">{{ streak }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Nav -->\n    <div style=\"display: flex; gap: 4px; padding: 10px 14px;\">\n      <sc-for list=\"{{ navItems }}\" as=\"nav\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ nav.go }}\" style=\"flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 7px 4px; border-radius: 9px; border: 1px solid {{ nav.border }}; background: {{ nav.bg }}; color: {{ nav.fg }}; font-family: inherit; font-size: 11.5px; font-weight: 600; cursor: pointer; letter-spacing: 0.02em;\">{{ nav.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- ============ TODAY VIEW ============ -->\n    <sc-if value=\"{{ showToday }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display: flex; flex-direction: column; flex: 1; min-height: 0;\">\n\n        <div style=\"padding: 6px 18px 14px 18px; display: flex; align-items: center; gap: 14px;\">\n          <div style=\"position: relative; width: 62px; height: 62px; flex-shrink: 0;\">\n            <svg width=\"62\" height=\"62\" viewBox=\"0 0 62 62\">\n              <circle cx=\"31\" cy=\"31\" r=\"26\" fill=\"none\" stroke=\"#232837\" stroke-width=\"6\"><\u002Fcircle>\n              <circle cx=\"31\" cy=\"31\" r=\"26\" fill=\"none\" stroke=\"#A8E637\" stroke-width=\"6\" stroke-linecap=\"round\" stroke-dasharray=\"{{ ringDash }}\" transform=\"rotate(-90 31 31)\"><\u002Fcircle>\n            <\u002Fsvg>\n            <div style=\"position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #E8EAF2;\">{{ pct }}%<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 4px; min-width: 0;\">\n            <div style=\"font-size: 13px; font-weight: 600; color: #E8EAF2;\">{{ progressHeadline }}<\u002Fdiv>\n            <div style=\"font-size: 11.5px; color: #8B92A8; line-height: 1.45;\">{{ progressSub }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex: 1; overflow-y: auto; padding: 0 14px 16px 14px; display: flex; flex-direction: column; gap: 10px; min-height: 0;\">\n          <sc-for list=\"{{ goals }}\" as=\"g\" hint-placeholder-count=\"3\">\n            <div style=\"background: #181C27; border: 1px solid #232B3D; border-radius: 14px; padding: 12px 12px 10px 12px; animation: riseIn 0.25s ease both;\">\n              <div style=\"display: flex; align-items: center; gap: 9px;\">\n                <button onclick=\"{{ g.toggle }}\" style=\"width: 20px; height: 20px; border-radius: 7px; border: 1.5px solid {{ g.boxBorder }}; background: {{ g.boxBg }}; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 0;\">\n                  <sc-if value=\"{{ g.done }}\" hint-placeholder-val=\"{{ false }}\">\n                    <svg width=\"11\" height=\"9\" viewBox=\"0 0 11 9\" fill=\"none\"><path d=\"M1 4.5L4 7.5L10 1\" stroke=\"#0B0D12\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fsc-if>\n                <\u002Fbutton>\n                <div style=\"flex: 1; font-size: 13.5px; font-weight: 600; color: {{ g.titleColor }}; text-decoration: {{ g.deco }};\">{{ g.title }}<\u002Fdiv>\n                <div style=\"font-size: 10.5px; font-weight: 600; color: #8B92A8; background: #12151D; border-radius: 6px; padding: 3px 7px;\">{{ g.countLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 2px; margin-top: 8px;\">\n                <sc-for list=\"{{ g.tasks }}\" as=\"t\" hint-placeholder-count=\"2\">\n                  <div style=\"display: flex; flex-direction: column;\">\n                    <div style=\"display: flex; align-items: center; gap: 9px; padding: 5px 0 5px 6px;\">\n                      <button onclick=\"{{ t.toggle }}\" style=\"width: 17px; height: 17px; border-radius: 6px; border: 1.5px solid {{ t.boxBorder }}; background: {{ t.boxBg }}; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 0;\">\n                        <sc-if value=\"{{ t.done }}\" hint-placeholder-val=\"{{ false }}\">\n                          <svg width=\"9\" height=\"8\" viewBox=\"0 0 11 9\" fill=\"none\"><path d=\"M1 4.5L4 7.5L10 1\" stroke=\"#0B0D12\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                        <\u002Fsc-if>\n                      <\u002Fbutton>\n                      <div style=\"flex: 1; font-size: 12.5px; color: {{ t.titleColor }}; text-decoration: {{ t.deco }};\">{{ t.title }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <sc-for list=\"{{ t.micros }}\" as=\"m\" hint-placeholder-count=\"0\">\n                      <div style=\"display: flex; align-items: center; gap: 8px; padding: 3px 0 3px 32px;\">\n                        <button onclick=\"{{ m.toggle }}\" style=\"width: 14px; height: 14px; border-radius: 5px; border: 1.5px solid {{ m.boxBorder }}; background: {{ m.boxBg }}; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 0;\">\n                          <sc-if value=\"{{ m.done }}\" hint-placeholder-val=\"{{ false }}\">\n                            <svg width=\"8\" height=\"7\" viewBox=\"0 0 11 9\" fill=\"none\"><path d=\"M1 4.5L4 7.5L10 1\" stroke=\"#0B0D12\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                          <\u002Fsc-if>\n                        <\u002Fbutton>\n                        <div style=\"flex: 1; font-size: 11.5px; color: {{ m.titleColor }}; text-decoration: {{ m.deco }};\">{{ m.title }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ noGoals }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align: center; color: #8B92A8; font-size: 12.5px; padding: 28px 12px; line-height: 1.6;\">No plan yet for today.<br>Head to <span style=\"color: #A8E637; font-weight: 600;\">Plan<\u002Fspan> to set your goals.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ PLAN VIEW ============ -->\n    <sc-if value=\"{{ showPlan }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display: flex; flex-direction: column; flex: 1; min-height: 0;\">\n        <div style=\"padding: 4px 18px 10px 18px;\">\n          <div style=\"font-size: 14px; font-weight: 600; color: #E8EAF2;\">Plan your day<\u002Fdiv>\n          <div style=\"font-size: 11.5px; color: #8B92A8; margin-top: 2px;\">Set goals, break them into tasks and micro-steps.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex: 1; overflow-y: auto; padding: 0 14px 12px 14px; display: flex; flex-direction: column; gap: 10px; min-height: 0;\">\n          <sc-for list=\"{{ planGoals }}\" as=\"g\" hint-placeholder-count=\"2\">\n            <div style=\"background: #181C27; border: 1px solid #232B3D; border-radius: 14px; padding: 12px;\">\n              <div style=\"display: flex; align-items: center; gap: 8px;\">\n                <div style=\"flex: 1; font-size: 13.5px; font-weight: 600; color: #E8EAF2;\">{{ g.title }}<\u002Fdiv>\n                <button onclick=\"{{ g.remove }}\" title=\"Remove goal\" style=\"width: 22px; height: 22px; border-radius: 7px; border: none; background: transparent; color: #545C70; cursor: pointer; font-size: 15px; line-height: 1; padding: 0;\" style-hover=\"color: #F4718A; background: #1D2330;\">×<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 6px; margin-top: 8px;\">\n                <sc-for list=\"{{ g.tasks }}\" as=\"t\" hint-placeholder-count=\"1\">\n                  <div style=\"display: flex; flex-direction: column; gap: 3px;\">\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding-left: 6px;\">\n                      <div style=\"width: 5px; height: 5px; border-radius: 50%; background: #545C70; flex-shrink: 0;\"><\u002Fdiv>\n                      <div style=\"flex: 1; font-size: 12.5px; color: #C6CBDA;\">{{ t.title }}<\u002Fdiv>\n                      <button onclick=\"{{ t.remove }}\" title=\"Remove task\" style=\"width: 20px; height: 20px; border-radius: 6px; border: none; background: transparent; color: #545C70; cursor: pointer; font-size: 13px; line-height: 1; padding: 0;\" style-hover=\"color: #F4718A;\">×<\u002Fbutton>\n                    <\u002Fdiv>\n                    <sc-for list=\"{{ t.micros }}\" as=\"m\" hint-placeholder-count=\"0\">\n                      <div style=\"display: flex; align-items: center; gap: 8px; padding-left: 26px;\">\n                        <div style=\"width: 4px; height: 4px; border-radius: 50%; background: #3A4152; flex-shrink: 0;\"><\u002Fdiv>\n                        <div style=\"flex: 1; font-size: 11.5px; color: #8B92A8;\">{{ m.title }}<\u002Fdiv>\n                        <button onclick=\"{{ m.remove }}\" title=\"Remove micro-task\" style=\"width: 18px; height: 18px; border-radius: 6px; border: none; background: transparent; color: #545C70; cursor: pointer; font-size: 12px; line-height: 1; padding: 0;\" style-hover=\"color: #F4718A;\">×<\u002Fbutton>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                    <div style=\"padding-left: 26px;\">\n                      <input value=\"{{ t.draft }}\" oninput=\"{{ t.onDraft }}\" onkeydown=\"{{ t.onKey }}\" placeholder=\"+ micro-step, press Enter\" style=\"width: 100%; box-sizing: border-box; background: transparent; border: none; border-bottom: 1px dashed #2A3040; color: #C6CBDA; font-family: inherit; font-size: 11px; padding: 3px 2px; outline: none;\">\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <input value=\"{{ g.draft }}\" oninput=\"{{ g.onDraft }}\" onkeydown=\"{{ g.onKey }}\" placeholder=\"+ add a task, press Enter\" style=\"width: 100%; box-sizing: border-box; background: #12151D; border: 1px solid #232B3D; border-radius: 8px; color: #C6CBDA; font-family: inherit; font-size: 12px; padding: 7px 10px; outline: none;\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <input value=\"{{ goalDraft }}\" oninput=\"{{ onGoalDraft }}\" onkeydown=\"{{ onGoalKey }}\" placeholder=\"+ add a goal for today, press Enter\" style=\"width: 100%; box-sizing: border-box; background: #181C27; border: 1px dashed #2E3750; border-radius: 12px; color: #E8EAF2; font-family: inherit; font-size: 12.5px; padding: 11px 12px; outline: none;\">\n        <\u002Fdiv>\n        <div style=\"padding: 12px 14px 14px 14px; border-top: 1px solid #1D2330;\">\n          <button onclick=\"{{ startDay }}\" style=\"width: 100%; background: #A8E637; border: none; border-radius: 11px; color: #0B0D12; font-family: inherit; font-size: 13.5px; font-weight: 700; padding: 11px; cursor: pointer; letter-spacing: 0.01em;\" style-hover=\"background: #C6F56B;\">Start the day →<\u002Fbutton>\n          <button onclick=\"{{ resetAll }}\" style=\"width: 100%; margin-top: 8px; background: transparent; border: 1px solid {{ resetBorder }}; border-radius: 11px; color: {{ resetColor }}; font-family: inherit; font-size: 11.5px; font-weight: 600; padding: 8px; cursor: pointer;\" style-hover=\"border-color: #F4718A; color: #F4718A;\">{{ resetLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ STATS VIEW ============ -->\n    <sc-if value=\"{{ showStats }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex: 1; overflow-y: auto; padding: 4px 18px 18px 18px; display: flex; flex-direction: column; gap: 18px; min-height: 0;\">\n\n        <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"font-size: 12px; font-weight: 600; color: #E8EAF2;\">Completion — last 14 days<\u002Fdiv>\n          <div style=\"display: flex; align-items: flex-end; gap: 4px; height: 76px; padding-top: 4px;\">\n            <sc-for list=\"{{ days14 }}\" as=\"d\" hint-placeholder-count=\"14\">\n              <div title=\"{{ d.tip }}\" style=\"flex: 1; display: flex; flex-direction: column; justify-content: flex-end; height: 100%;\">\n                <div style=\"height: {{ d.h }}px; background: {{ d.bg }}; border-radius: 3px 3px 1px 1px; min-height: 2px;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display: flex; justify-content: space-between; font-size: 9.5px; color: #545C70;\"><span>{{ d14From }}<\u002Fspan><span>80% target<\u002Fspan><span>Today<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"display: flex; align-items: baseline; justify-content: space-between;\">\n            <div style=\"font-size: 12px; font-weight: 600; color: #E8EAF2;\">Planned vs. done — last 7 days<\u002Fdiv>\n            <div style=\"display: flex; gap: 10px; font-size: 9.5px; color: #8B92A8;\">\n              <span style=\"display: flex; align-items: center; gap: 4px;\"><span style=\"width: 7px; height: 7px; border-radius: 2px; background: #3A4152; display: inline-block;\"><\u002Fspan>planned<\u002Fspan>\n              <span style=\"display: flex; align-items: center; gap: 4px;\"><span style=\"width: 7px; height: 7px; border-radius: 2px; background: #A8E637; display: inline-block;\"><\u002Fspan>done<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: flex-end; gap: 8px; height: 64px;\">\n            <sc-for list=\"{{ days7 }}\" as=\"d\" hint-placeholder-count=\"7\">\n              <div title=\"{{ d.tip }}\" style=\"flex: 1; display: flex; align-items: flex-end; justify-content: center; gap: 3px; height: 100%;\">\n                <div style=\"width: 9px; height: {{ d.plannedH }}px; background: #3A4152; border-radius: 2px 2px 0 0; min-height: 2px;\"><\u002Fdiv>\n                <div style=\"width: 9px; height: {{ d.doneH }}px; background: #A8E637; border-radius: 2px 2px 0 0; min-height: 2px;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display: flex; gap: 8px;\">\n            <sc-for list=\"{{ days7 }}\" as=\"d\" hint-placeholder-count=\"7\">\n              <div style=\"flex: 1; text-align: center; font-size: 9.5px; color: #545C70;\">{{ d.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"font-size: 12px; font-weight: 600; color: #E8EAF2;\">When you get things done<\u002Fdiv>\n          <div style=\"display: flex; align-items: flex-end; gap: 5px; height: 52px;\">\n            <sc-for list=\"{{ hourBuckets }}\" as=\"b\" hint-placeholder-count=\"6\">\n              <div title=\"{{ b.tip }}\" style=\"flex: 1; display: flex; flex-direction: column; justify-content: flex-end; height: 100%;\">\n                <div style=\"height: {{ b.h }}px; background: #6EA8FF; border-radius: 3px 3px 1px 1px; min-height: 2px; opacity: 0.85;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display: flex; gap: 5px;\">\n            <sc-for list=\"{{ hourBuckets }}\" as=\"b\" hint-placeholder-count=\"6\">\n              <div style=\"flex: 1; text-align: center; font-size: 9px; color: #545C70;\">{{ b.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"display: flex; align-items: baseline; justify-content: space-between;\">\n            <div style=\"font-size: 12px; font-weight: 600; color: #E8EAF2;\">Streak calendar — last 4 weeks<\u002Fdiv>\n            <div style=\"font-size: 9.5px; color: #8B92A8;\">■ = hit 80%<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px;\">\n            <sc-for list=\"{{ calCells }}\" as=\"c\" hint-placeholder-count=\"28\">\n              <div title=\"{{ c.tip }}\" style=\"aspect-ratio: 1; border-radius: 6px; background: {{ c.bg }}; border: 1px solid {{ c.border }};\"><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ REVIEW VIEW ============ -->\n    <sc-if value=\"{{ showReview }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display: flex; flex-direction: column; flex: 1; min-height: 0;\">\n        <div style=\"flex: 1; overflow-y: auto; padding: 4px 18px 12px 18px; display: flex; flex-direction: column; gap: 14px; min-height: 0;\">\n          <div style=\"text-align: center; padding: 10px 0 2px 0;\">\n            <div style=\"font-size: 40px; font-weight: 700; color: {{ reviewPctColor }}; letter-spacing: -0.02em;\">{{ pct }}%<\u002Fdiv>\n            <div style=\"font-size: 12.5px; color: #E8EAF2; font-weight: 600; margin-top: 2px;\">{{ reviewHeadline }}<\u002Fdiv>\n            <div style=\"font-size: 11.5px; color: #8B92A8; margin-top: 4px; line-height: 1.5;\">{{ reviewSub }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n            <sc-for list=\"{{ reviewGoals }}\" as=\"g\" hint-placeholder-count=\"3\">\n              <div style=\"background: #181C27; border: 1px solid #232B3D; border-radius: 11px; padding: 10px 12px; display: flex; align-items: center; gap: 10px;\">\n                <div style=\"flex: 1; font-size: 12.5px; color: #E8EAF2; font-weight: 500;\">{{ g.title }}<\u002Fdiv>\n                <div style=\"font-size: 11px; font-weight: 700; color: {{ g.pctColor }};\">{{ g.pctLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 12px 14px 14px 14px; border-top: 1px solid #1D2330;\">\n          <sc-if value=\"{{ dayClosed }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align: center; font-size: 12px; color: #8B92A8; padding: 6px 0;\">Day closed. See you tomorrow.<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ dayOpen }}\" hint-placeholder-val=\"{{ true }}\">\n            <button onclick=\"{{ closeDay }}\" style=\"width: 100%; background: #1D2330; border: 1px solid #2E3750; border-radius: 11px; color: #E8EAF2; font-family: inherit; font-size: 13px; font-weight: 600; padding: 11px; cursor: pointer;\" style-hover=\"background: #242B3B;\">Close the day &amp; log it<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Toast -->\n    <sc-if value=\"{{ toastVisible }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%); z-index: 70; background: #E8EAF2; color: #0B0D12; font-size: 12.5px; font-weight: 700; padding: 9px 18px; border-radius: 999px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); animation: toastPop 0.28s cubic-bezier(0.34,1.56,0.64,1) both; white-space: nowrap;\">{{ toastMsg }}<\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 520, &quot;height&quot;: 760}, &quot;target&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 80, &quot;min&quot;: 50, &quot;max&quot;: 100, &quot;step&quot;: 5, &quot;unit&quot;: &quot;%&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Behavior&quot;}, &quot;celebrations&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Behavior&quot;}, &quot;tone&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;warm&quot;, &quot;minimal&quot;], &quot;default&quot;: &quot;warm&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Copy&quot;}}\">\nclass Component extends DCLogic {\n  state = { view: 'today', data: null, drafts: {}, goalDraft: '', toast: null };\n\n  componentDidMount() {\n    this._particles = [];\n    const data = this.load();\n    this.setState({ data, view: data.today.goals.length ? 'today' : 'plan' });\n  }\n\n  // ---------- persistence ----------\n  key() { return 'dailyPlanner.v2'; }\n  todayISO() { return new Date().toISOString().slice(0, 10); }\n\n  load() {\n    let data = null;\n    try { data = JSON.parse(localStorage.getItem(this.key())); } catch (e) {}\n    if (!data) data = this.seed();\n    // day rollover: archive stale day\n    if (data.today.date !== this.todayISO()) {\n      const info = this.dayInfo(data.today.goals, data.today.hours);\n      if (data.today.goals.length) data.history[data.today.date] = info;\n      data.today = { date: this.todayISO(), goals: [], hours: [], closed: false };\n    }\n    return data;\n  }\n  save(data) { try { localStorage.setItem(this.key(), JSON.stringify(data)); } catch (e) {} }\n  update(fn) {\n    const data = JSON.parse(JSON.stringify(this.state.data));\n    fn(data);\n    this.save(data);\n    this.setState({ data });\n    return data;\n  }\n\n  seed() {\n    const history = {};\n    const pcts = [55, 82, 90, 40, 71, 88, 100, 62, 85, 93, 78, 84, 91, 66, 87, 100, 45, 83, 89, 92];\n    for (let i = pcts.length; i >= 1; i--) {\n      const d = new Date(); d.setDate(d.getDate() - i);\n      const iso = d.toISOString().slice(0, 10);\n      const pct = pcts[pcts.length - i];\n      const planned = 6 + (i % 5);\n      const done = Math.round(planned * pct / 100);\n      const hours = [];\n      for (let k = 0; k < done; k++) hours.push([9, 10, 11, 14, 15, 16, 20][k % 7]);\n      history[iso] = { pct, planned, done, hours };\n    }\n    let id = 1; const nid = () => 'i' + (id++);\n    const mk = (title, done) => ({ id: nid(), title, done: !!done });\n    const goals = [\n      { id: nid(), title: 'Ship the quarterly report', tasks: [\n        { id: nid(), title: 'Draft the outline', micros: [mk('Gather Q2 numbers', true), mk('List key wins', true)] },\n        { id: nid(), title: 'Write the first pass', micros: [mk('Intro + summary', true), mk('Metrics section', false)] },\n        Object.assign(mk('Send for review'), { micros: [] }),\n      ]},\n      { id: nid(), title: 'Refactor the auth module', tasks: [\n        { id: nid(), title: 'Map current flow', micros: [mk('Sketch sequence diagram', true)] },\n        Object.assign(mk('Extract token helper'), { micros: [] }),\n      ]},\n      { id: nid(), title: 'Life admin', tasks: [\n        Object.assign(mk('Book dentist appointment'), { micros: [] }),\n        Object.assign(mk('15 min inbox zero', true), { micros: [] }),\n      ]},\n    ];\n    const data = { nextId: id, history, today: { date: this.todayISO(), goals, hours: [9, 10, 11] , closed: false } };\n    this.save(data);\n    return data;\n  }\n\n  // ---------- model helpers ----------\n  leaves(goal) {\n    const out = [];\n    for (const t of goal.tasks) {\n      if (t.micros && t.micros.length) out.push(...t.micros); else out.push(t);\n    }\n    if (!goal.tasks.length) out.push(goal);\n    return out;\n  }\n  allLeaves(goals) { return goals.flatMap(g => this.leaves(g)); }\n  pctOf(goals) {\n    const ls = this.allLeaves(goals);\n    if (!ls.length) return 0;\n    return Math.round(100 * ls.filter(l => l.done).length / ls.length);\n  }\n  dayInfo(goals, hours) {\n    const ls = this.allLeaves(goals);\n    return { pct: this.pctOf(goals), planned: ls.length, done: ls.filter(l => l.done).length, hours: hours || [] };\n  }\n  target() { return this.props.target ?? 80; }\n  warm() { return (this.props.tone ?? 'warm') === 'warm'; }\n\n  findItem(goals, id) {\n    for (const g of goals) {\n      if (g.id === id) return { item: g, kind: 'goal', goal: g };\n      for (const t of g.tasks) {\n        if (t.id === id) return { item: t, kind: 'task', goal: g, task: t };\n        for (const m of (t.micros || [])) if (m.id === id) return { item: m, kind: 'micro', goal: g, task: t };\n      }\n    }\n    return null;\n  }\n  isDone(node, kind) {\n    if (kind === 'micro') return !!node.done;\n    if (kind === 'task') return (node.micros && node.micros.length) ? node.micros.every(m => m.done) : !!node.done;\n    const ls = this.leaves(node);\n    return ls.length > 0 && ls.every(l => l.done);\n  }\n  setAll(node, kind, val) {\n    if (kind === 'micro') { node.done = val; return; }\n    if (kind === 'task') {\n      if (node.micros && node.micros.length) node.micros.forEach(m => m.done = val); else node.done = val;\n      return;\n    }\n    if (node.tasks.length) node.tasks.forEach(t => this.setAll(t, 'task', val)); else node.done = val;\n  }\n\n  toggle(id) {\n    const before = this.state.data;\n    const prevPct = this.pctOf(before.today.goals);\n    const found0 = this.findItem(before.today.goals, id);\n    if (!found0) return;\n    const goalId = found0.goal.id;\n    const goalDoneBefore = this.isDone(found0.goal, 'goal');\n    const willBe = !this.isDone(found0.item, found0.kind);\n\n    const data = this.update(d => {\n      const f = this.findItem(d.today.goals, id);\n      this.setAll(f.item, f.kind, willBe);\n      if (willBe) d.today.hours.push(new Date().getHours());\n    });\n\n    if (!willBe) return;\n    const goalNow = this.findItem(data.today.goals, goalId).item;\n    const pctNow = this.pctOf(data.today.goals);\n    const t = this.target();\n    if (prevPct < t && pctNow >= t) {\n      this.celebrate('big');\n      this.toast(this.warm() ? `${t}% hit — streak secured!` : `${t}% reached`);\n    } else if (!goalDoneBefore && this.isDone(goalNow, 'goal')) {\n      this.celebrate('goal');\n      this.toast(this.warm() ? 'Goal complete. Nice one!' : 'Goal complete');\n    } else if (found0.kind !== 'micro' || this.isDone(this.findItem(data.today.goals, found0.task.id).item, 'task')) {\n      if (found0.kind === 'micro') this.celebrate('small');\n    }\n  }\n\n  toast(msg) {\n    clearTimeout(this._toastT);\n    this.setState({ toast: msg });\n    this._toastT = setTimeout(() => this.setState({ toast: null }), 2400);\n  }\n\n  // ---------- streak ----------\n  streak() {\n    const d = this.state.data; if (!d) return 0;\n    let n = 0;\n    const t = this.target();\n    const todayInfo = this.dayInfo(d.today.goals, d.today.hours);\n    let cursor = new Date();\n    if (d.today.closed && todayInfo.pct >= t) { n++; }\n    else if (d.today.closed) { /* closed below target: streak broken */ return 0; }\n    cursor.setDate(cursor.getDate() - 1);\n    for (let i = 0; i < 365; i++) {\n      const iso = cursor.toISOString().slice(0, 10);\n      const h = d.history[iso];\n      if (h && h.pct >= t) { n++; cursor.setDate(cursor.getDate() - 1); } else break;\n    }\n    return n;\n  }\n\n  // ---------- celebrations (canvas ribbons) ----------\n  celebrate(size) {\n    if (!(this.props.celebrations ?? true)) return;\n    const canvas = this._canvas; if (!canvas) return;\n    const colors = ['#A8E637', '#FFB454', '#6EA8FF', '#F471B5', '#E8EAF2'];\n    const n = size === 'big' ? 120 : size === 'goal' ? 60 : 18;\n    const W = canvas.width, H = canvas.height;\n    for (let i = 0; i < n; i++) {\n      this._particles.push({\n        x: W / 2 + (Math.random() - 0.5) * 120,\n        y: H * 0.55,\n        vx: (Math.random() - 0.5) * 9,\n        vy: -6 - Math.random() * 8,\n        w: 4 + Math.random() * 4, h: 9 + Math.random() * 8,\n        rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 0.35,\n        color: colors[i % colors.length],\n        life: 0, ttl: 90 + Math.random() * 60, phase: Math.random() * Math.PI * 2,\n      });\n    }\n    if (!this._raf) this.tick();\n  }\n  tick() {\n    const canvas = this._canvas;\n    if (!canvas) { this._raf = null; return; }\n    const ctx = canvas.getContext('2d');\n    ctx.clearRect(0, 0, canvas.width, canvas.height);\n    this._particles = this._particles.filter(p => p.life < p.ttl && p.y < canvas.height + 30);\n    for (const p of this._particles) {\n      p.life++;\n      p.vy += 0.18; p.vx *= 0.985; p.vy *= 0.99;\n      p.x += p.vx + Math.sin(p.life * 0.15 + p.phase) * 1.2;\n      p.y += p.vy;\n      p.rot += p.vr;\n      const alpha = p.life > p.ttl - 25 ? (p.ttl - p.life) / 25 : 1;\n      ctx.save();\n      ctx.translate(p.x, p.y); ctx.rotate(p.rot);\n      ctx.globalAlpha = Math.max(0, alpha);\n      ctx.fillStyle = p.color;\n      const squeeze = Math.sin(p.life * 0.2 + p.phase);\n      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h * Math.max(0.35, Math.abs(squeeze)));\n      ctx.restore();\n    }\n    if (this._particles.length) this._raf = requestAnimationFrame(() => this.tick());\n    else { this._raf = null; }\n  }\n\n  // ---------- plan editing ----------\n  setDraft(id, v) { this.setState(s => ({ drafts: Object.assign({}, s.drafts, { [id]: v }) })); }\n  addGoal() {\n    const title = (this.state.goalDraft || '').trim(); if (!title) return;\n    this.update(d => { d.today.goals.push({ id: 'i' + (d.nextId++), title, tasks: [] }); });\n    this.setState({ goalDraft: '' });\n  }\n  addTask(goalId) {\n    const title = (this.state.drafts[goalId] || '').trim(); if (!title) return;\n    this.update(d => {\n      const g = d.today.goals.find(g => g.id === goalId);\n      g.tasks.push({ id: 'i' + (d.nextId++), title, done: false, micros: [] });\n    });\n    this.setDraft(goalId, '');\n  }\n  addMicro(goalId, taskId) {\n    const title = (this.state.drafts[taskId] || '').trim(); if (!title) return;\n    this.update(d => {\n      const g = d.today.goals.find(g => g.id === goalId);\n      const t = g.tasks.find(t => t.id === taskId);\n      t.micros = t.micros || [];\n      t.micros.push({ id: 'i' + (d.nextId++), title, done: false });\n    });\n    this.setDraft(taskId, '');\n  }\n  removeNode(id) {\n    this.update(d => {\n      d.today.goals = d.today.goals.filter(g => g.id !== id);\n      for (const g of d.today.goals) {\n        g.tasks = g.tasks.filter(t => t.id !== id);\n        for (const t of g.tasks) t.micros = (t.micros || []).filter(m => m.id !== id);\n      }\n    });\n  }\n  resetAll() {\n    if (!this.state.confirmReset) {\n      this.setState({ confirmReset: true });\n      clearTimeout(this._resetT);\n      this._resetT = setTimeout(() => this.setState({ confirmReset: false }), 4000);\n      return;\n    }\n    clearTimeout(this._resetT);\n    const data = { nextId: 1, history: {}, today: { date: this.todayISO(), goals: [], hours: [], closed: false } };\n    this.save(data);\n    this.setState({ data, confirmReset: false, drafts: {}, goalDraft: '', view: 'plan' });\n    this.toast('Clean slate. Plan your first day!');\n  }\n\n  closeDay() {\n    const data = this.update(d => {\n      d.today.closed = true;\n      d.history[d.today.date] = this.dayInfo(d.today.goals, d.today.hours);\n    });\n    const pct = this.pctOf(data.today.goals);\n    if (pct >= this.target()) this.celebrate('big');\n    this.toast(this.warm() ? (pct >= this.target() ? 'Day logged. Streak +1!' : 'Day logged. Fresh start tomorrow.') : 'Day logged');\n  }\n\n  // ---------- view models ----------\n  box(done) {\n    return done\n      ? { boxBg: '#A8E637', boxBorder: '#A8E637', titleColor: '#6A7288', deco: 'line-through' }\n      : { boxBg: 'transparent', boxBorder: '#3A4152', titleColor: '#E8EAF2', deco: 'none' };\n  }\n  goalVM(g) {\n    const done = this.isDone(g, 'goal');\n    const ls = this.leaves(g);\n    return Object.assign({\n      id: g.id, title: g.title, done,\n      countLabel: ls.filter(l => l.done).length + '/' + ls.length,\n      toggle: () => this.toggle(g.id),\n      tasks: g.tasks.map(t => {\n        const td = this.isDone(t, 'task');\n        return Object.assign({\n          id: t.id, title: t.title, done: td,\n          toggle: () => this.toggle(t.id),\n          micros: (t.micros || []).map(m => Object.assign({\n            id: m.id, title: m.title, done: !!m.done,\n            toggle: () => this.toggle(m.id),\n          }, this.box(!!m.done))),\n        }, this.box(td), { titleColor: td ? '#6A7288' : '#C6CBDA' });\n      }),\n    }, this.box(done));\n  }\n\n  renderVals() {\n    const d = this.state.data;\n    const view = this.state.view;\n    const nav = (id, label) => ({\n      label, go: () => this.setState({ view: id }),\n      bg: view === id ? '#242B3B' : 'transparent',\n      border: view === id ? '#2E3750' : 'transparent',\n      fg: view === id ? '#E8EAF2' : '#8B92A8',\n    });\n    const base = {\n      setCanvas: el => { this._canvas = el; },\n      navItems: [nav('plan', 'Plan'), nav('today', 'Today'), nav('stats', 'Stats'), nav('review', 'Review')],\n      showToday: view === 'today', showPlan: view === 'plan', showStats: view === 'stats', showReview: view === 'review',\n      toastVisible: !!this.state.toast, toastMsg: this.state.toast || '',\n      dateLabel: new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' }),\n    };\n    if (!d) return Object.assign(base, { goals: [], planGoals: [], streak: 0, pct: 0, ringDash: '0 999', headerSub: '', noGoals: false, progressHeadline: '', progressSub: '' });\n\n    const pct = this.pctOf(d.today.goals);\n    const streak = this.streak();\n    const t = this.target();\n    const ls = this.allLeaves(d.today.goals);\n    const doneCount = ls.filter(l => l.done).length;\n    const circ = 2 * Math.PI * 26;\n\n    // stats\n    const days14 = [];\n    for (let i = 13; i >= 0; i--) {\n      const dt = new Date(); dt.setDate(dt.getDate() - i);\n      const iso = dt.toISOString().slice(0, 10);\n      const p = i === 0 ? pct : (d.history[iso] ? d.history[iso].pct : 0);\n      days14.push({\n        h: Math.max(2, Math.round(p * 0.72)),\n        bg: p >= t ? '#A8E637' : (p > 0 ? '#3A4152' : '#1D2330'),\n        tip: dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' — ' + p + '%',\n      });\n    }\n    const d14From = (() => { const dt = new Date(); dt.setDate(dt.getDate() - 13); return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); })();\n\n    let maxPlanned = 1;\n    const days7raw = [];\n    for (let i = 6; i >= 0; i--) {\n      const dt = new Date(); dt.setDate(dt.getDate() - i);\n      const iso = dt.toISOString().slice(0, 10);\n      const info = i === 0 ? { planned: ls.length, done: doneCount } : (d.history[iso] || { planned: 0, done: 0 });\n      maxPlanned = Math.max(maxPlanned, info.planned);\n      days7raw.push({ dt, info });\n    }\n    const days7 = days7raw.map(({ dt, info }) => ({\n      label: dt.toLocaleDateString('en-US', { weekday: 'narrow' }),\n      plannedH: Math.max(2, Math.round(info.planned / maxPlanned * 56)),\n      doneH: Math.max(2, Math.round(info.done / maxPlanned * 56)),\n      tip: info.done + ' of ' + info.planned + ' planned',\n    }));\n\n    const buckets = [0, 0, 0, 0, 0, 0];\n    const labels = ['6–9', '9–12', '12–15', '15–18', '18–21', '21+'];\n    const allHours = [...d.today.hours];\n    Object.values(d.history).forEach(h => allHours.push(...(h.hours || [])));\n    allHours.forEach(h => {\n      const idx = h < 6 ? 5 : Math.min(5, Math.floor((h - 6) / 3));\n      buckets[idx]++;\n    });\n    const maxB = Math.max(1, ...buckets);\n    const hourBuckets = buckets.map((v, i) => ({ label: labels[i], h: Math.max(2, Math.round(v / maxB * 46)), tip: v + ' tasks done' }));\n\n    const calCells = [];\n    for (let i = 27; i >= 0; i--) {\n      const dt = new Date(); dt.setDate(dt.getDate() - i);\n      const iso = dt.toISOString().slice(0, 10);\n      const p = i === 0 ? pct : (d.history[iso] ? d.history[iso].pct : null);\n      let bg = '#151926', border = '#1D2330';\n      if (p !== null) {\n        if (p >= t) { bg = '#A8E637'; border = '#A8E637'; }\n        else if (p >= 50) { bg = '#4A5A2A'; border = '#4A5A2A'; }\n        else if (p > 0) { bg = '#2A3040'; border = '#2A3040'; }\n      }\n      calCells.push({ bg, border, tip: dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + (p === null ? ' — no plan' : ' — ' + p + '%') });\n    }\n\n    const warm = this.warm();\n    const remaining = ls.length - doneCount;\n    const progressHeadline = pct >= t ? (warm ? 'Target hit — fantastic day!' : 'Target reached')\n      : pct >= 50 ? (warm ? 'Great momentum, keep going' : 'In progress')\n      : (warm ? 'Fresh start — pick one small step' : 'Early in the day');\n    const progressSub = doneCount + ' of ' + ls.length + ' done · ' + (pct >= t ? 'streak secured for today' : remaining + ' to go, ' + Math.max(0, Math.ceil(ls.length * t / 100) - doneCount) + ' more to hit ' + t + '%');\n\n    // plan view models\n    const planGoals = d.today.goals.map(g => ({\n      title: g.title,\n      remove: () => this.removeNode(g.id),\n      draft: this.state.drafts[g.id] || '',\n      onDraft: e => this.setDraft(g.id, e.target.value),\n      onKey: e => { if (e.key === 'Enter') this.addTask(g.id); },\n      tasks: g.tasks.map(tk => ({\n        title: tk.title,\n        remove: () => this.removeNode(tk.id),\n        draft: this.state.drafts[tk.id] || '',\n        onDraft: e => this.setDraft(tk.id, e.target.value),\n        onKey: e => { if (e.key === 'Enter') this.addMicro(g.id, tk.id); },\n        micros: (tk.micros || []).map(m => ({ title: m.title, remove: () => this.removeNode(m.id) })),\n      })),\n    }));\n\n    const reviewGoals = d.today.goals.map(g => {\n      const gl = this.leaves(g);\n      const gp = gl.length ? Math.round(100 * gl.filter(l => l.done).length / gl.length) : 0;\n      return { title: g.title, pctLabel: gp + '%', pctColor: gp >= t ? '#A8E637' : gp >= 50 ? '#FFB454' : '#8B92A8' };\n    });\n\n    return Object.assign(base, {\n      streak, pct,\n      ringDash: (circ * pct / 100).toFixed(1) + ' ' + circ.toFixed(1),\n      headerSub: streak > 0 ? streak + '-day streak · target ' + t + '%' : 'target ' + t + '% · build your streak',\n      goals: d.today.goals.map(g => this.goalVM(g)),\n      noGoals: !d.today.goals.length,\n      progressHeadline, progressSub,\n      planGoals,\n      goalDraft: this.state.goalDraft,\n      onGoalDraft: e => this.setState({ goalDraft: e.target.value }),\n      onGoalKey: e => { if (e.key === 'Enter') this.addGoal(); },\n      startDay: () => this.setState({ view: 'today' }),\n      resetAll: () => this.resetAll(),\n      resetLabel: this.state.confirmReset ? 'Really erase all goals, history & streak?' : 'Reset everything — start from zero',\n      resetBorder: this.state.confirmReset ? '#F4718A' : '#2A3040',\n      resetColor: this.state.confirmReset ? '#F4718A' : '#8B92A8',\n      days14, d14From, days7, hourBuckets, calCells,\n      reviewGoals,\n      reviewPctColor: pct >= t ? '#A8E637' : pct >= 50 ? '#FFB454' : '#8B92A8',\n      reviewHeadline: pct >= t ? (warm ? 'You crushed it today' : 'Target reached') : pct >= 50 ? (warm ? 'Solid progress today' : 'Partial completion') : (warm ? 'Tomorrow is a fresh page' : 'Below target'),\n      reviewSub: doneCount + ' of ' + ls.length + ' planned items completed' + (pct >= t ? ' — that counts toward your streak.' : ' — ' + t + '% keeps the streak alive.'),\n      dayClosed: !!d.today.closed,\n      dayOpen: !d.today.closed,\n      closeDay: () => this.closeDay(),\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
