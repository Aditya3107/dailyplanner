document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-size: calc(14px * var(--fs, 1)); font-weight: 700; color: var(--amber); letter-spacing: 0.08em; text-transform: uppercase;\">day streak<\u002Fdiv>\n          <div style=\"font-size: calc(12px * var(--fs, 1)); font-weight: 600; color: #FFFFFF; opacity: 0.85;\">You did a great job!<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ YESTERDAY CARRYOVER ============ -->\n    <sc-if value=\"{{ carryVisible }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position: absolute; inset: 0; z-index: 78; background: var(--panel); display: flex; flex-direction: column;\">\n        <div style=\"padding: 18px 18px 12px 18px; border-bottom: 1px solid var(--line);\">\n          <div style=\"font-size: calc(15px * var(--fs, 1)); font-weight: 700; color: var(--text);\">Yesterday · {{ carryDateLabel }}<\u002Fdiv>\n          <div style=\"font-size: calc(11.5px * var(--fs, 1)); color: var(--muted); margin-top: 3px; line-height: 1.5;\">{{ carrySummary }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; min-height: 0;\">\n          <sc-for list=\"{{ carryGoals }}\" as=\"g\" hint-placeholder-count=\"2\">\n            <div style=\"background: var(--card); border: 1px solid var(--border3); border-radius: 14px; padding: 12px;\">\n              <div style=\"display: flex; align-items: center; gap: 9px;\">\n                <div style=\"flex: 1; font-size: calc(13px * var(--fs, 1)); font-weight: 600; color: var(--text);\">{{ g.title }}<\u002Fdiv>\n                <div style=\"font-size: calc(10.5px * var(--fs, 1)); font-weight: 700; color: {{ g.pctColor }};\">{{ g.pctLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 2px; margin-top: 8px;\">\n                <sc-for list=\"{{ g.items }}\" as=\"t\" hint-placeholder-count=\"2\">\n                  <div style=\"display: flex; carryPrimaryVisible }}\" hint-placeholder-val=\"{{ false }}\">\n            <button sc-camel-on-click=\"{{ carryGo }}\" style=\"width: 100%; background: {{ carryBtnBg }}; border: none; border-radius: 11px; color: {{ carryBtnFg }}; font-family: inherit; font-size: calc(13.5px * var(--fs, 1)); font-weight: 700; padding: 11px; cursor: pointer;\">{{ carryBtnLabel }}<\u002Fbutton>\n          <\u002Fsc-if>\n          <button sc-camel-on-click=\"{{ dismissCarry }}\" style=\"width: 100%; background: transparent; border: 1px solid var(--border2); border-radius: 11px; color: var(--muted); font-family: inherit; font-size: calc(12.5px * var(--fs, 1)); font-weight: 600; padding: 10px; cursor: pointer;\" style-hover=\"color: var(--text);\">{{ dismissLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- First-run guide -->\n    <sc-if value=\"{{ guideVisible }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position: absolute; inset: 0; z-index: 79; background: var(--panel); display: flex; flex-direction: column;\">\n        <div style=\"flex: 1; overflow-y: auto; padding: 26px 22px 12px 22px; display: flex; flex-direction: column; gap: 16px; min-height: 0;\">\n          <div>\n            <div style=\"font-size: calc(20px * var(--fs, 1)); font-weight: 700; color: var(--text);\">{{ guideHi }}<\u002Fdiv>\n            <div style=\"font-size: calc(12px * var(--fs, 1)); color: var(--muted); margin-top: 4px; line-height: 1.5;\">Here's how your planner works. 30 seconds, then it's all yours.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n            <sc-for list=\"{{ guideSteps }}\" as=\"s\" hint-placeholder-count=\"4\">\n              <div style=\"display: flex; gap: 12px; background: var(--card); border: 1px solid var(--border3); border-radius: 13px; padding: 12px;\">\n                <div style=\"width: 26px; height: 26px; border-radius: 9px; background: var(--line); color: var(--accent); font-size: calc(13px * var(--fs, 1)); font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0;\">{{ s.n }}<\u002Fdiv>\n                <div style=\"min-width: 0;\">\n                  <div style=\"font-size: calc(12.5px * var(--fs, 1)); font-weight: 700; color: var(--text);\">{{ s.title }}<\u002Fdiv>\n                  <div style=\"font-size: calc(11.5px * var(--fs, 1)); color: var(--muted); line-height: 1.5; margin-top: 2px;\">{{ s.body }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font-size: calc(11px * var(--fs, 1)); color: var(--faint); line-height: 1.5; text-align: center;\">Changed your mind later? The gear ⚙ (top right) has the target slider, your name, themes, and a full reset.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 12px 14px 14px 14px; border-top: 1px solid var(--line);\">\n          <button sc-camel-on-click=\"{{ startFromZero }}\" style=\"width: 100%; background: var(--accent); border: none; border-radius: 11px; color: var(--onAccent); font-family: inherit; font-size: calc(13.5px * var(--fs, 1)); font-weight: 700; padding: 12px; cursor: pointer;\" style-hover=\"background: var(--accentHover);\">Start from zero →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Name prompt -->\n    <sc-if value=\"{{ askName }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position: absolute; inset: 0; z-index: 80; background: var(--panel); display: flex; align-items: center; justify-content: center; padding: 28px;\">\n        <div style=\"width: 100%; max-width: 280px; display: flex; flex-direction: column; gap: 14px; text-align: center;\">\n          <div style=\"font-size: calc(22px * var(--fs, 1)); font-weight: 700; color: var(--text);\">Welcome 👋<\u002Fdiv>\n          <div style=\"font-size: calc(12.5px * var(--fs, 1)); color: var(--muted); line-height: 1.5;\">What should we call you?<\u002Fdiv>\n          <input value=\"{{ nameDraft }}\" sc-camel-on-input=\"{{ onNameDraft }}\" sc-camel-on-key-down=\"{{ onNameKey }}\" enterkeyhint=\"done\" placeholder=\"Your name\" style=\"width: 100%; box-sizing: border-box; background: var(--card); border: 1px solid var(--border2); border-radius: 11px; color: var(--text); font-family: inherit; font-size: calc(14px * var(--fs, 1)); padding: 12px; outline: none; text-align: center;\">\n          <button sc-camel-on-click=\"{{ saveName }}\" style=\"width: 100%; background: var(--accent); border: none; border-radius: 11px; color: var(--onAccent); font-family: inherit; font-size: calc(13.5px * var(--fs, 1)); font-weight: 700; padding: 12px; cursor: pointer;\" style-hover=\"background: var(--accentHover);\">Let's go →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Reopen confirm popup -->\n    <sc-if value=\"{{ reopenVisible }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position: absolute; inset: 0; z-index: 74; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; padding: 24px;\">\n        <div style=\"background: var(--card); border: 1px solid var(--border2); border-radius: 16px; padding: 18px 16px; width: 100%; max-width: 280px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 16px 48px rgba(0,0,0,0.5);\">\n          <div style=\"font-size: calc(13.5px * var(--fs, 1)); font-weight: 700; color: var(--text); text-align: center;\">Open this again?<\u002Fdiv>\n          <div style=\"font-size: calc(11.5px * var(--fs, 1)); color: var(--muted); text-align: center; line-height: 1.5;\">\"{{ reopenTitle }}\" is done. Reopening marks it (and anything under it) as unfinished, and your progress for today will drop.<\u002Fdiv>\n          <div style=\"display: flex; gap: 8px; margin-top: 2px;\">\n            <button sc-camel-on-click=\"{{ cancelReopen }}\" style=\"flex: 1; background: var(--panel); border: 1px solid var(--border2); border-radius: 10px; color: var(--text); font-family: inherit; font-size: calc(12.5px * var(--fs, 1)); font-weight: 600; padding: 10px; cursor: pointer;\">Keep it done<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ doReopen }}\" style=\"flex: 1; background: var(--accent); border: none; border-radius: 10px; color: var(--onAccent); font-family: inherit; font-size: calc(12.5px * var(--fs, 1)); font-weight: 700; padding: 10px; cursor: pointer;\">Reopen<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Reset confirm popup -->\n    <sc-if value=\"{{ confirmVisible }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position: absolute; inset: 0; z-index: 75; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; padding: 24px;\">\n        <div style=\"background: var(--card); border: 1px solid var(--border2); border-radius: 16px; padding: 18px 16px; width: 100%; max-width: 280px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 16px 48px rgba(0,0,0,0.5);\">\n          <div style=\"font-size: calc(13.5px * var(--fs, 1)); font-weight: 700; color: var(--text); text-align: center;\">Start from a clean slate?<\u002Fdiv>\n          <div style=\"font-size: calc(11.5px * var(--fs, 1)); color: var(--muted); text-align: center; line-height: 1.5;\">This erases all goals, history and your streak. There's no undo.<\u002Fdiv>\n          <div style=\"display: flex; gap: 8px; margin-top: 2px;\">\n            <button sc-camel-on-click=\"{{ cancelReset }}\" style=\"flex: 1; background: var(--panel); border: 1px solid var(--border2); border-radius: 10px; color: var(--text); font-family: inherit; font-size: calc(12.5px * var(--fs, 1)); font-weight: 600; padding: 10px; cursor: pointer;\">Cancel<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ doReset }}\" style=\"flex: 1; background: var(--danger); border: none; border-radius: 10px; color: #FFFFFF; font-family: inherit; font-size: calc(12.5px * var(--fs, 1)); font-weight: 700; padding: 10px; cursor: pointer;\">Reset<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Toast -->\n    <sc-if value=\"{{ toastVisible }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position: absolute; left: 50%; top: 45%; transform: translate(-50%, -50%); z-index: 70; background: var(--toastBg); color: var(--toastFg); font-size: calc(12.5px * var(--fs, 1)); font-weight: 700; padding: 9px 18px; border-radius: 999px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); animation: toastPop 0.28s cubic-bezier(0.34,1.56,0.64,1) both; white-space: normal; max-width: 82%; text-align: center;\">{{ toastMsg }}<\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 520, &quot;height&quot;: 760}, &quot;target&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 80, &quot;min&quot;: 50, &quot;max&quot;: 100, &quot;step&quot;: 5, &quot;unit&quot;: &quot;%&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Behavior&quot;}, &quot;celebrations&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Behavior&quot;}, &quot;tone&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;warm&quot;, &quot;minimal&quot;], &quot;default&quot;: &quot;warm&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Copy&quot;}}\">\nclass Component extends DCLogic {\n  state = { view: 'today', data: null, drafts: {}, goalDraft: '', toast: null, settings: { fs: 100, font: 'grotesk', theme: 'midnight' } };\n\n  componentDidMount() {\n    this._particles = [];\n    this._minT = setInterval(() => this.forceUpdate(), 60000);\n    const data = this.load();\n    const settings = this.loadSettings();\n    const carrySel = {};\n    if (data.carryover) for (const lid of this.openLeafIds(data.carryover.goals)) carrySel[lid] = true;\n    this.setState({ data, settings, carrySel, guide: !!this._firstRun && !settings.name, view: data.today.goals.length ? 'today' : 'plan' });\n    this.applyBody(settings.theme);\n  }\n\n  // ---------- persistence ----------\n  key() { return 'dailyPlanner.v2'; }\n  todayISO() { return new Date().toISOString().slice(0, 10); }\n\n  load() {\n    let data = null;\n    try { data = JSON.parse(localStorage.getItem(this.key())); } catch (e) {}\n    if (!data) data = this.seed();\n    if (data.today.startedAt === undefined) data.today.startedAt = data.today.goals.length ? Date.now() : null;\n    // day rollover: archive stale day, keep it for the carryover review\n    if (data.today.date !== this.todayISO()) {\n      const info = this.dayInfo(data.today.goals, data.today.hours);\n      if (data.today.goals.length) {\n        info.startedAt = data.today.startedAt || null;\n        data.history[data.today.date] = info;\n        const cGoals = [];\n        for (const g of data.today.goals) {\n          const ts = g.tasks.filter(t => !t.repeat);\n          if (!g.tasks.length || ts.length) cGoals.push(Object.assign({}, g, { tasks: ts }));\n        }\n        if (cGoals.length) data.carryover = { date: data.today.date, goals: cGoals };\n      }\n      const oldGoals = data.today.goals;\n      data.today = { date: this.todayISO(), goals: [], hours: [], closed: false, startedAt: null };\n      const isWeekend = [0, 6].includes(new Date().getDay());\n      for (const og of oldGoals) {\n        for (const ot of og.tasks) {\n          if (ot.repeat !== 'daily' && !(ot.repeat === 'weekdays' && !isWeekend)) continue;\n          let g = data.today.goals.find(x => x.title === og.title);\n          if (!g) { g = { id: 'i' + (data.nextId++), title: og.title, note: og.note, tasks: [], at: Date.now() }; data.today.goals.push(g); }\n          g.tasks.push({ id: 'i' + (data.nextId++), title: ot.title, done: false, micros: (ot.micros || []).map(m => ({ id: 'i' + (data.nextId++), title: m.title, done: false })), at: Date.now(), slot: ot.slot, repeat: ot.repeat });\n        }\n      }\n    }\n    return data;\n  }\n  save(data) { try { localStorage.setItem(this.key(), JSON.stringify(data)); } catch (e) {} }\n  update(fn) {\n    const data = JSON.parse(JSON.stringify(this.state.data));\n    fn(data);\n    this.save(data);\n    this.setState({ data });\n    return data;\n  }\n\n  seed() {\n    this._firstRun = true;\n    const data = { nextId: 1, history: {}, today: { date: this.todayISO(), goals: [], hours: [], closed: false, startedAt: null } };\n    this.save(data);\n    return data;\n  }\n\n  // ---------- model helpers ----------\n  leaves(goal) {\n    const out = [];\n    for (const t of goal.tasks) {\n      if (t.micros && t.micros.length) out.push(...t.micros); else out.push(t);\n    }\n    if (!goal.tasks.length) out.push(goal);\n    return out;\n  }\n  allLeaves(goals) { return goals.flatMap(g => this.leaves(g)); }\n  pctOf(goals) {\n    const ls = this.allLeaves(goals);\n    if (!ls.length) return 0;\n    return Math.round(100 * ls.filter(l => l.done).length / ls.length);\n  }\n  dayInfo(goals, hours) {\n    const ls = this.allLeaves(goals);\n    return { pct: this.pctOf(goals), planned: ls.length, done: ls.filter(l => l.done).length, hours: hours || [], doneT: ls.filter(l => l.done).map(l => l.title).slice(0, 40), missT: ls.filter(l => !l.done).map(l => l.title).slice(0, 40) };\n  }\n  target() { const s = this.state.settings; return (s && s.target) || this.props.target || 80; }\n  warm() { return (this.props.tone ?? 'warm') === 'warm'; }\n\n  findItem(goals, id) {\n    for (const g of goals) {\n      if (g.id === id) return { item: g, kind: 'goal', goal: g };\n      for (const t of g.tasks) {\n        if (t.id === id) return { item: t, kind: 'task', .celebrate('goal');\n      this.toast(this.warm() ? 'Goal complete. Nice one!' : 'Goal complete');\n    } else if (found0.kind !== 'micro' || this.isDone(this.findItem(data.today.goals, found0.task.id).item, 'task')) {\n      if (found0.kind === 'micro') this.celebrate('small');\n    }\n  }\n\n  showStreakPop(n) {\n    const stg = this.state.settings || {};\n    if (stg.streakOn === false || stg.celebrations === false) return;\n    clearTimeout(this._streakT);\n    this.setState({ streakPop: Math.max(1, n) });\n    this._streakT = setTimeout(() => this.setState({ streakPop: null }), 2600);\n  }\n\n  toast(msg) {\n    clearTimeout(this._toastT);\n    this.setState({ toast: msg });\n    this._toastT = setTimeout(() => this.setState({ toast: null }), 2400);\n  }\n\n  // ---------- streak ----------\n  streak() {\n    const d = this.state.data; if (!d) return 0;\n    let n = 0;\n    const t = this.target();\n    const todayInfo = this.dayInfo(d.today.goals, d.today.hours);\n    let cursor = new Date();\n    if (todayInfo.pct >= t && this.allLeaves(d.today.goals).length) { n++; }\n    cursor.setDate(cursor.getDate() - 1);\n    for (let i = 0; i < 365; i++) {\n      const iso = cursor.toISOString().slice(0, 10);\n      const dow = cursor.getDay();\n      const h = d.history[iso];\n      if (h && h.pct >= t) { n++; cursor.setDate(cursor.getDate() - 1); }\n      else if (dow === 0 || dow === 6) { cursor.setDate(cursor.getDate() - 1); } // weekends never break (or count unless hit)\n      else break;\n    }\n    return n;\n  }\n\n  // ---------- celebrations (canvas ribbons) ----------\n  celebrate(size) {\n    if ((this.state.settings || {}).celebrations === false || !(this.props.celebrations ?? true)) return;\n    const canvas = this._canvas; if (!canvas) return;\n    const colors = this.palette();\n    const n = size === 'big' ? 120 : size === 'goal' ? 60 : 18;\n    const W = canvas.width, H = canvas.height;\n    for (let i = 0; i < n; i++) {\n      this._particles.push({ rt', day: 'numeric' }) : 'no starts logged yet',\n      bestStreak: best + (best === 1 ? ' day' : ' days'),\n      bestStreakSub: best > 0 && streak >= best ? 'current streak matches it' : 'current: ' + streak + (streak === 1 ? ' day' : ' days'),\n      monthLabel: new Date().toLocaleDateString('en-US', { month: 'long' }),\n      monthHit: mDays ? mHit + '/' + mDays + ' days' : '·',\n      monthSub: mDays ? 'hit target · avg ' + Math.round(mPctSum / mDays) + '%' : 'no days planned yet',\n      topDone, topMissed,\n      noTopDone: !topDone.length,\n      noTopMissed: !topMissed.length,\n      reviewGoals,\n      reviewPctColor: pct >= t ? 'var(--accent)' : pct >= 50 ? 'var(--amber)' : 'var(--muted)',\n      reviewHeadline: pct >= t ? (warm ? 'You crushed it today' : 'Target reached') : pct >= 50 ? (warm ? 'Solid progress today' : 'Partial completion') : (warm ? 'Tomorrow is a fresh page' : 'Below target'),\n      reviewSub: doneCount + ' of ' + ls.length + ' planned items completed' + (pct >= t ? '. That counts toward your streak.' : '. ' + t + '% keeps the streak alive.'),\n      dayClosed: !!d.today.closed,\n      dayOpen: !d.today.closed,\n      closeDay: () => this.closeDay(),\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
